<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAVE REPTILE GAME</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/translations.js"></script>
<script src="js/auth.js"></script>
</head>
<body>
<div class="top-right-panel">
  <!-- Date display -->
  <div id="date-display" style="display:none"></div>
  <div id="time-display" style="display:none"></div>
  <div class="lang-toggle">
    <button class="pixel-btn small" onclick="toggleGameLang()">EN/KO</button>
  </div>
</div>

<div id="game-nav">
  <button class="pixel-btn small" id="btn-nav-home" onclick="doGoHome()">홈</button>
  <button class="pixel-btn small red" id="btn-nav-logout" onclick="doLogout()">로그아웃</button>
  <button class="pixel-btn small" id="btn-nav-dogram" onclick="openDogram()" style="display:none;background:#6a3a8a;color:#e0c0ff"></button>
</div>

<div id="game-container">
  <canvas id="game-canvas"
    onclick="canvas_click(event)"
    onmousemove="canvas_mousemove(event)">
  </canvas>

  <!-- UI Overlay (shown in room after born) -->
  <div id="ui-overlay" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap">
      <span id="lizard-name-label" style="font-size:9px;color:#e8a020;white-space:nowrap"></span>
      <span id="age-label" style="font-size:8px;color:#aaa;white-space:nowrap"></span>
      <span id="gender-label" style="font-size:8px;white-space:nowrap;display:none"></span>
      <span id="weight-label" style="font-size:8px;color:#c8e860;white-space:nowrap"></span>
      <div class="stat-bar-wrap">
        <span class="stat-label" id="lbl-hunger"></span>
        <div class="stat-bar"><div class="stat-fill hunger" id="bar-hunger" style="width:80%"></div></div>
      </div>
      <div class="stat-bar-wrap">
        <span class="stat-label" id="lbl-happy"></span>
        <div class="stat-bar"><div class="stat-fill happy" id="bar-happy" style="width:70%"></div></div>
      </div>
      <div class="stat-bar-wrap">
        <span class="stat-label" id="lbl-bond"></span>
        <div class="stat-bar"><div class="stat-fill bond" id="bar-bond" style="width:10%"></div></div>
      </div>
      <div class="stat-bar-wrap">
        <span class="stat-label" id="lbl-hydration"></span>
        <div class="stat-bar"><div class="stat-fill hydration" id="bar-hydration" style="width:80%"></div></div>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button class="pixel-btn small" id="btn-handle" onclick="doHandle()"></button>
      <button class="pixel-btn small blue" id="btn-feed" onclick="doFeed()"></button>
      <button class="pixel-btn small" id="btn-water" onclick="doWater()" style="background:#4abfe8;color:#fff"></button>
      <button class="pixel-btn small" id="btn-status" onclick="doStatus()" style="background:#7a4ae8;color:#fff"></button>
      <button class="pixel-btn small" id="btn-sleep" onclick="doSleep()" style="display:none;background:#1e1550;color:#aaaaee"></button>
      <button class="pixel-btn small" id="btn-farm" onclick="openFarm()" style="background:#3a7a3a;color:#c8f0c8"></button>
    </div>
  </div>

  <!-- Outdoor overlay (shown when gathering dandelions) -->
  <div id="outdoor-overlay" style="display:none">
    <span id="outdoor-counter" style="font-size:9px;color:#c8e84a;white-space:nowrap"></span>
    <button class="pixel-btn small" id="btn-leave-outdoor" onclick="leaveOutdoor()" style="background:#7ab520;color:#fff"></button>
  </div>

  <!-- Message box -->
  <div id="msg-box"></div>

  <!-- Farm modal -->
  <div id="farm-modal" style="display:none">
    <div class="modal-panel farm-panel">
      <div class="farm-header">
        <h2 id="farm-title"></h2>
        <span id="coin-display" style="font-size:8px;color:#e8c030;white-space:nowrap"></span>
        <button class="pixel-btn small red" onclick="closeFarm()">✕</button>
      </div>
      <div class="tab-btns">
        <button class="tab-btn active" id="tab-btn-cricket" onclick="switchFarmTab('cricket')"></button>
        <button class="tab-btn" id="tab-btn-cgestie" onclick="switchFarmTab('cgestie')"></button>
        <button class="tab-btn" id="tab-btn-chicory" onclick="switchFarmTab('chicory')"></button>
      </div>
      <!-- Cricket panel -->
      <div id="farm-cricket-panel">
        <div class="farm-canvas-wrap">
          <canvas id="farm-cricket-canvas" width="320" height="100"></canvas>
        </div>
        <div class="farm-stat-row">
          <span class="stat-label" id="lbl-cricket-count"></span>
          <div class="stat-bar wide"><div class="stat-fill cricket" id="bar-cricket" style="width:0%"></div></div>
          <span id="cricket-count-text" style="font-size:7px;color:#e8a020;white-space:nowrap">0 / 150</span>
        </div>
        <p id="cricket-care-status" class="farm-info" style="margin-bottom:2px"></p>
        <p id="cricket-info" class="farm-info"></p>
        <div class="farm-stat-row" style="margin-top:4px">
          <span class="stat-label" id="lbl-pellet"></span>
          <div class="stat-bar wide"><div class="stat-fill" id="bar-pellet" style="width:0%;background:#c87830"></div></div>
          <span id="pellet-count-text" style="font-size:7px;color:#c87830;white-space:nowrap">0 / 10</span>
        </div>
        <div class="farm-btns">
          <button class="pixel-btn small" id="btn-cricket-get" onclick="doCricketGet()"></button>
          <button class="pixel-btn small" id="btn-pellet-get" onclick="doPelletGet()" style="background:#c87830;color:#fff"></button>
        </div>
        <div class="farm-btns" style="margin-top:4px">
          <button class="pixel-btn small green" id="btn-cricket-care" onclick="doCricketCare()"></button>
          <button class="pixel-btn small blue" id="btn-cricket-feed" onclick="doCricketFeed()"></button>
        </div>
      </div>
      <!-- Crestie food panel -->
      <div id="farm-cgestie-panel" style="display:none">
        <div class="farm-stat-row">
          <span class="stat-label" id="lbl-cgestie-food"></span>
          <div class="stat-bar wide"><div class="stat-fill" id="bar-cgestie-food" style="width:0%;background:#e87820"></div></div>
          <span id="cgestie-food-count-text" style="font-size:7px;color:#e87820;white-space:nowrap">0 / 10</span>
        </div>
        <div class="farm-btns">
          <button class="pixel-btn small" id="btn-cgestie-food-get" onclick="doCgestieFoodGet()" style="background:#e87820;color:#fff"></button>
          <button class="pixel-btn small blue" id="btn-cgestie-feed-lizard" onclick="doCgestieFeedLizard()"></button>
        </div>
      </div>
      <!-- Chicory panel -->
      <div id="farm-chicory-panel" style="display:none">
        <div class="farm-canvas-wrap">
          <canvas id="farm-chicory-canvas" width="320" height="100"></canvas>
        </div>
        <div class="farm-stat-row">
          <span class="stat-label" id="lbl-chicory-stage"></span>
          <div class="stat-bar wide"><div class="stat-fill chicory" id="bar-chicory" style="width:0%"></div></div>
          <span id="chicory-stage-text" style="font-size:7px;color:#4a9a3a;white-space:nowrap">-</span>
        </div>
        <p id="chicory-info" class="farm-info"></p>
        <div class="farm-stat-row" style="margin-top:4px">
          <span class="stat-label" id="lbl-chicory-stock"></span>
          <span id="chicory-stock-text" style="font-size:9px;color:#4a9a3a;margin-left:8px">0</span>
        </div>
        <div class="farm-btns">
          <button class="pixel-btn small green" id="btn-chicory-plant" onclick="doChicoryPlant()"></button>
          <button class="pixel-btn small" id="btn-chicory-water" onclick="doChicoryWater()" style="background:#4abfe8;color:#fff"></button>
          <button class="pixel-btn small green" id="btn-chicory-harvest" onclick="doChicoryHarvest()"></button>
        </div>
        <div class="farm-btns" style="margin-top:4px">
          <button class="pixel-btn small green" id="btn-chicory-feed-lizard" onclick="doChicoryFeedLizard()"></button>
          <button class="pixel-btn small" id="btn-sell-chicory" onclick="doSellChicory()" style="background:#e8c030;color:#1a1a1a"></button>
        </div>
        <!-- Dandelion section -->
        <div style="border-top:1px solid #3a4a2a;margin-top:8px;padding-top:6px">
          <div class="farm-stat-row">
            <span class="stat-label" id="lbl-dandelion-stock"></span>
            <div class="stat-bar wide"><div class="stat-fill" id="bar-dandelion" style="width:0%;background:#c8e84a"></div></div>
            <span id="dandelion-stock-text" style="font-size:7px;color:#c8e84a;white-space:nowrap">0 / 10</span>
          </div>
          <p id="dandelion-season-info" class="farm-info"></p>
          <div class="farm-btns">
            <button class="pixel-btn small" id="btn-dandelion-gather" onclick="doDandelionGather()" style="background:#7ab520;color:#fff"></button>
            <button class="pixel-btn small green" id="btn-dandelion-feed-lizard" onclick="doDandelionFeedLizard()"></button>
          </div>
          <div class="farm-btns" style="margin-top:4px">
            <button class="pixel-btn small" id="btn-sell-dandelion" onclick="doSellDandelion()" style="background:#e8c030;color:#1a1a1a"></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dogram modal -->
  <div id="dogram-modal" style="display:none">
    <div class="modal-panel dogram-panel">
      <!-- Main view: list of lizards -->
      <div id="dogram-main-view">
        <div class="dogram-header">
          <h2 id="dogram-title"></h2>
          <button class="pixel-btn small red" onclick="closeDogram()">✕</button>
        </div>
        <div id="dogram-grid"></div>
        <div style="margin-top:14px;text-align:center">
          <button class="pixel-btn small" id="btn-add-lizard" onclick="showDogramAdd()" style="background:#6a3a8a;color:#e0c0ff"></button>
        </div>
      </div>
      <!-- Add view: pick species -->
      <div id="dogram-add-view" style="display:none">
        <div class="dogram-header">
          <h2 id="dogram-add-title"></h2>
          <button class="pixel-btn small red" onclick="closeDogram()">✕</button>
        </div>
        <p id="dogram-add-subtitle" style="font-size:7px;color:#aaa;text-align:center;margin-bottom:14px;line-height:1.8"></p>
        <div class="dogram-type-btns">
          <button class="pixel-btn dogram-type-btn" id="btn-dogram-crestie" onclick="pickNewLizardType('crestie')" style="background:#e87820;color:#fff"></button>
          <button class="pixel-btn dogram-type-btn" id="btn-dogram-bt" onclick="pickNewLizardType('bluetongue')" style="background:#5a8a6a;color:#fff"></button>
        </div>
        <div style="text-align:center;margin-top:12px">
          <button class="pixel-btn small" id="btn-dogram-back" onclick="showDogramMain()"></button>
        </div>
      </div>
      <!-- Country view: pick country (bluetongue only) -->
      <div id="dogram-country-view" style="display:none">
        <div class="dogram-header">
          <h2 id="dogram-country-title"></h2>
          <button class="pixel-btn small red" onclick="closeDogram()">✕</button>
        </div>
        <p id="dogram-country-subtitle" style="font-size:7px;color:#aaa;text-align:center;margin-bottom:14px;line-height:1.8;white-space:pre-line"></p>
        <div class="dogram-type-btns" id="dogram-country-btns"></div>
        <div style="text-align:center;margin-top:12px">
          <button class="pixel-btn small" id="btn-dogram-country-back" onclick="showDogramAdd()"></button>
        </div>
      </div>
      <!-- Morph view: pick morph -->
      <div id="dogram-morph-view" style="display:none">
        <div class="dogram-header">
          <h2 id="dogram-morph-title"></h2>
          <button class="pixel-btn small red" onclick="closeDogram()">✕</button>
        </div>
        <p id="dogram-morph-subtitle" style="font-size:7px;color:#aaa;text-align:center;margin-bottom:14px;line-height:1.8;white-space:pre-line"></p>
        <div class="dogram-type-btns" id="dogram-morph-btns"></div>
        <div style="text-align:center;margin-top:12px">
          <button class="pixel-btn small" id="btn-dogram-morph-back" onclick="dogramMorphBack()"></button>
        </div>
      </div>
      <!-- Color view: pick color (crestie only) -->
      <div id="dogram-color-view" style="display:none">
        <div class="dogram-header">
          <h2 id="dogram-color-title"></h2>
          <button class="pixel-btn small red" onclick="closeDogram()">✕</button>
        </div>
        <p id="dogram-color-subtitle" style="font-size:7px;color:#aaa;text-align:center;margin-bottom:14px;line-height:1.8;white-space:pre-line"></p>
        <div class="dogram-type-btns" id="dogram-color-btns"></div>
        <div style="text-align:center;margin-top:12px">
          <button class="pixel-btn small" id="btn-dogram-color-back" onclick="showDogramMorph()"></button>
        </div>
      </div>
      <!-- Trait view: pick traits -->
      <div id="dogram-trait-view" style="display:none">
        <div class="dogram-header">
          <h2 id="dogram-trait-title"></h2>
          <button class="pixel-btn small red" onclick="closeDogram()">✕</button>
        </div>
        <p id="dogram-trait-subtitle" style="font-size:7px;color:#aaa;text-align:center;margin-bottom:14px;line-height:1.8;white-space:pre-line"></p>
        <div class="dogram-type-btns" id="dogram-trait-btns"></div>
        <div style="text-align:center;margin-top:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="pixel-btn small" id="btn-dogram-trait-back" onclick="showDogramColorOrMorph()"></button>
          <button class="pixel-btn small green" id="btn-dogram-confirm-traits" onclick="confirmNewLizardTraits()"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Name modal -->
  <div id="name-modal" style="display:none">
    <div class="modal-panel">
      <h2 id="modal-title"></h2>
      <p id="modal-prompt" style="white-space:pre-line"></p>
      <div class="form-group">
        <input class="pixel-input" type="text" id="lizard-name-input" maxlength="16"
          onkeydown="if(event.key==='Enter')confirmName()">
      </div>
      <button class="pixel-btn green" style="width:100%" id="modal-confirm" onclick="confirmName()"></button>
    </div>
  </div>
</div>

<div id="watermark">@chocoreptier</div>

<script src="js/game.js"></script>
<script>
function toggleGameLang() {
  setLang(currentLang === 'ko' ? 'en' : 'ko');
  updateGameLabels();
}

function updateGameLabels() {
  document.getElementById('lbl-hunger').textContent = t('hunger');
  document.getElementById('lbl-happy').textContent = t('happy');
  document.getElementById('lbl-bond').textContent = t('bond');
  document.getElementById('btn-handle').textContent = t('handle_btn');
  document.getElementById('btn-feed').textContent = t('feed_btn');
  document.getElementById('lbl-hydration').textContent = t('hydration');
  document.getElementById('btn-status').textContent = t('status_btn');
  // water button label depends on lizard type (set after gs is loaded)
  const wKey = (typeof lizardType !== 'undefined' && lizardType === 'bluetongue') ? 'water_btn_bt' : 'water_btn';
  document.getElementById('btn-water').textContent = t(wKey);
  document.getElementById('btn-nav-home').textContent = t('home_btn');
  document.getElementById('btn-nav-logout').textContent = t('logout');
  document.getElementById('btn-nav-dogram').textContent = t('dogram_btn');
  document.getElementById('btn-sleep').textContent = t('sleep_btn');
  document.getElementById('btn-farm').textContent = t('farm_btn');
  document.getElementById('btn-leave-outdoor').textContent = t('dandelion_complete_btn');
  if (document.getElementById('farm-modal').style.display !== 'none') updateFarmUI();
  if (outdoorState) updateOutdoorCounter();
}

function doGoHome() {
  saveGame();
  window.location.href = 'index.html';
}

function doLogout() {
  saveGame();
  AUTH.logout();
  window.location.href = 'index.html';
}

window.addEventListener('load', () => {
  if (!AUTH.currentUser()) { window.location.href = 'index.html'; return; }
  updateGameLabels();
});
</script>
</body>
</html>
